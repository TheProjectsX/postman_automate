<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Postman Automate — GUI</title>
        <link rel="stylesheet" href="/styles.css" />
    </head>
    <body>
        <div id="app" class="container">
            <aside class="panel controls">
                <header class="tool-header">
                    <h1>Postman Automate</h1>
                    <p class="muted">Developer GUI</p>
                </header>

                <section class="card file-section">
                    <div class="file-inputs-row">
                        <div
                            class="file-upload-zone"
                            id="collectionZone"
                            data-for="collectionFile"
                        >
                            <label for="collectionFile" class="file-label">
                                <div class="file-icon">📄</div>
                                <div class="file-text">
                                    <div class="file-required">
                                        Collection File *
                                    </div>
                                    <div class="file-hint">Drag or click</div>
                                </div>
                            </label>
                            <input
                                id="collectionFile"
                                type="file"
                                accept=".json"
                            />
                        </div>
                        <div
                            class="file-upload-zone"
                            id="workflowZone"
                            data-for="workflowFile"
                        >
                            <label for="workflowFile" class="file-label">
                                <div class="file-icon">📋</div>
                                <div class="file-text">
                                    <div>Workflow File (optional)</div>
                                    <div class="file-hint">Drag or click</div>
                                </div>
                            </label>
                            <input
                                id="workflowFile"
                                type="file"
                                accept=".json"
                            />
                        </div>
                    </div>
                    <div id="uploadedFiles" class="uploaded-files"></div>
                </section>

                <details class="card" id="additionalSettings">
                    <summary>⚙ Additional Settings</summary>
                    <div class="collapse-grid">
                        <div class="settings-grid">
                            <label class="field"
                                >Delay (ms)
                                <input
                                    id="delay"
                                    type="number"
                                    placeholder="1000"
                                />
                            </label>
                            <label class="field"
                                >Timeout (ms)
                                <input
                                    id="timeout"
                                    type="number"
                                    placeholder="30000"
                                />
                            </label>
                            <label class="field"
                                >Skip Patterns (comma)
                                <input
                                    id="skip"
                                    type="text"
                                    placeholder="path1,path2"
                                />
                            </label>
                            <label class="field"
                                >Only Patterns (comma)
                                <input
                                    id="only"
                                    type="text"
                                    placeholder="pathA,pathB"
                                />
                            </label>
                            <label class="field full"
                                >Context / Extra AI Instructions
                                <textarea
                                    id="context"
                                    rows="3"
                                    placeholder="Helpful context for AI..."
                                ></textarea>
                            </label>
                            <label class="checkbox">
                                <input id="dry" type="checkbox" /> Dry Run
                            </label>
                        </div>
                    </div>
                </details>

                <div class="actions card">
                    <button id="startBtn" class="primary">Start</button>
                    <button id="stopBtn">Stop</button>
                    <button id="resetBtn">Reset</button>
                </div>

                <section class="card status" id="runStatus">
                    <div class="status-row">
                        <div>
                            <strong>Status:</strong>
                            <span id="statusText" class="status-badge"
                                >idle</span
                            >
                        </div>
                        <div>
                            <strong>Duration:</strong>
                            <span id="duration">—</span>
                        </div>
                    </div>
                    <div class="status-row">
                        <div>
                            <strong>Started:</strong>
                            <span id="startedAt" class="time-text">—</span>
                        </div>
                        <div>
                            <strong>Ended:</strong>
                            <span id="endedAt" class="time-text">—</span>
                        </div>
                    </div>

                    <div class="stats" id="stats">
                        <div class="stat">
                            <div class="label">Total</div>
                            <div id="statTotal">00</div>
                        </div>
                        <div class="stat">
                            <div class="label">Success</div>
                            <div id="statSuccess">00</div>
                        </div>
                        <div class="stat">
                            <div class="label">Failed</div>
                            <div id="statFailed">00</div>
                        </div>
                        <div class="stat">
                            <div class="label">Skipped</div>
                            <div id="statSkipped">00</div>
                        </div>
                        <div class="stat">
                            <div class="label">Errors</div>
                            <div id="statErrors">00</div>
                        </div>
                    </div>

                    <div class="card-actions" id="downloadActions"></div>
                </section>
            </aside>

            <main class="panel logs">
                <div class="top-row">
                    <h2>Timelines & Logs</h2>
                </div>

                <details class="card timeline" id="processTimelineCard" open>
                    <summary>Process Timeline</summary>
                    <div class="collapse-grid">
                        <div id="processTimeline" class="timeline-list"></div>
                    </div>
                </details>

                <details class="card timeline" id="routeTimelineCard" open>
                    <summary>Route Timeline</summary>
                    <div class="collapse-grid">
                        <div id="routeTimeline" class="routes-list"></div>
                    </div>
                </details>

                <details class="card logs-card" id="liveLogsCard" open>
                    <summary>Live Logs</summary>
                    <div class="collapse-grid">
                        <div id="liveLogs" class="live-logs"></div>
                    </div>
                </details>
            </main>
        </div>

        <div
            id="promptPopup"
            class="prompt hidden"
            role="dialog"
            aria-hidden="true"
        >
            <div class="prompt-bar">
                <div class="title">AI Input Required</div>
                <div class="controls">
                    <!-- <button id="minimizePrompt" type="button" title="Minimize">_</button> -->
                    <button id="closePrompt" type="button" title="Close">
                        ×
                    </button>
                </div>
            </div>
            <div class="prompt-body">
                <div id="promptQuestion" class="prompt-question"></div>
                <textarea
                    id="promptAnswer"
                    class="prompt-answer"
                    rows="3"
                    placeholder="Type your answer..."
                ></textarea>
                <div class="prompt-actions">
                    <button
                        id="submitPrompt"
                        type="button"
                        class="primary"
                        disabled
                    >
                        Submit
                    </button>
                </div>
            </div>
        </div>

        <script src="/app.js"></script>
    </body>
</html>
